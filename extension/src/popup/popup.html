<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Tab Capture</title>
  <style>
    body {
      width: 360px;
      min-height: 400px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      background: #f8f9fa;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
      color: #212529;
    }

    .status {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-weight: 500;
    }

    .status.idle {
      background: #e3f2fd;
      color: #1565c0;
    }

    .status.recording {
      background: #ffebee;
      color: #c62828;
    }

    .tabs-section {
      margin-bottom: 20px;
    }

    .section-title {
      font-weight: 600;
      margin-bottom: 12px;
      color: #495057;
    }

    .tab-list {
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      background: white;
    }

    .tab-item {
      display: flex;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid #e9ecef;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .tab-item:last-child {
      border-bottom: none;
    }

    .tab-item:hover {
      background: #f8f9fa;
    }

    .tab-item.recording {
      background: #fff3e0;
      border-left: 4px solid #ff9800;
    }

    .tab-favicon {
      width: 16px;
      height: 16px;
      margin-right: 8px;
      flex-shrink: 0;
    }

    .tab-info {
      flex: 1;
      min-width: 0;
    }

    .tab-title {
      font-weight: 500;
      color: #212529;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tab-url {
      font-size: 12px;
      color: #6c757d;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .tab-actions {
      display: flex;
      gap: 8px;
      margin-left: 8px;
    }

    .btn {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-start {
      background: #28a745;
      color: white;
    }

    .btn-start:hover {
      background: #218838;
    }

    .btn-stop {
      background: #dc3545;
      color: white;
    }

    .btn-stop:hover {
      background: #c82333;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .sessions-section {
      margin-top: 20px;
    }

    .session-item {
      background: white;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
    }

    .session-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .session-title {
      font-weight: 500;
      color: #212529;
    }

    .session-status {
      font-size: 12px;
      padding: 2px 6px;
      border-radius: 4px;
      background: #e3f2fd;
      color: #1565c0;
    }

    .session-details {
      font-size: 12px;
      color: #6c757d;
    }

    .empty-state {
      text-align: center;
      padding: 20px;
      color: #6c757d;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #6c757d;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #e9ecef;
      border-top: 2px solid #007bff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Audio Tab Capture</h1>
  </div>

  <div id="status" class="status idle">
    Ready to capture audio
  </div>

  <div class="tabs-section">
    <div class="section-title">Audible Tabs</div>
    <div id="tabList" class="tab-list">
      <div class="loading">
        <div class="spinner"></div>
        Loading tabs...
      </div>
    </div>
  </div>

  <div class="sessions-section">
    <div class="section-title">Active Sessions</div>
    <div id="sessionList">
      <div class="empty-state">No active recording sessions</div>
    </div>
  </div>

  <script type="module" src="popup.ts"></script>
</body>
</html>
